<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="./app_icon.jpg" />
    <link rel="apple-touch-icon" href="./app_icon.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    <title>Transit 乗換案内 - Spotify Style</title>
  </head>
  <body>
    <!-- モバイルデバッグ用エラー表示表示 -->
    <div id="js-error-display" style="display:none; color:#f3727f; background:#121212; padding:20px; position:fixed; top:0; left:0; width:100%; height:100%; z-index:99999; overflow:auto; font-family:monospace;">
      <h2 style="margin-bottom:10px;">JavaScript Error Detected:</h2>
      <pre id="js-error-text" style="white-space:pre-wrap; word-break:break-all;"></pre>
      <button onclick="location.reload()" style="margin-top:20px; padding:10px 20px; background:#1ed760; color:black; border:none; border-radius:9999px; font-weight:bold;">再読み込み</button>
    </div>
    <script>
      window.addEventListener('error', function(e) {
        document.getElementById('js-error-display').style.display = 'block';
        document.getElementById('js-error-text').textContent += '\n' + e.message + ' (' + e.filename + ':' + e.lineno + ':' + e.colno + ')';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('js-error-display').style.display = 'block';
        document.getElementById('js-error-text').textContent += '\nUnhandled Promise Rejection: ' + (e.reason ? e.reason.message || e.reason : e);
      });
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
